name: _sheet76 (temp)
on: { workflow_dispatch: {} }
env:
  APP_URL: "https://influencer-seeding-mu.vercel.app"
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sS "$APP_URL/api/b2b-revenue/fetch?checksheet=1" -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" -o /tmp/o
          echo "bytes: $(wc -c < /tmp/o)"
          head -c 6000 /tmp/o; echo

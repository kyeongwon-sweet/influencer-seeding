name: (admin) Delete Slack messages

# 일회용 관리 도구: 여믄봇(SLACK_BOT_TOKEN)이 보낸 특정 메시지를 ts로 삭제.
# 봇 토큰 chat.delete는 봇 자신이 보낸 메시지만 지울 수 있음(사람 메시지 삭제 불가).
# workflow_dispatch 전용 — 수동 실행할 때만 동작.
on:
  workflow_dispatch:
    inputs:
      channel:
        description: "채널 ID (기본: #빙과_마케팅_리포트)"
        type: string
        default: "C0B4F7GBX17"
      ts_list:
        description: "삭제할 메시지 ts 목록 (쉼표 구분)"
        type: string
        required: true

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: chat.delete each ts
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CHANNEL: ${{ github.event.inputs.channel }}
          TS_LIST: ${{ github.event.inputs.ts_list }}
        run: |
          fail=0
          IFS=',' read -ra TSS <<< "$TS_LIST"
          for ts in "${TSS[@]}"; do
            ts="$(echo "$ts" | xargs)"   # trim
            [ -z "$ts" ] && continue
            resp=$(curl -s -X POST https://slack.com/api/chat.delete \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "{\"channel\":\"$CHANNEL\",\"ts\":\"$ts\"}")
            ok=$(echo "$resp" | jq -r '.ok')
            err=$(echo "$resp" | jq -r '.error // ""')
            if [ "$ok" = "true" ]; then
              echo "✅ deleted $ts"
            elif [ "$err" = "message_not_found" ]; then
              echo "☑️ $ts already gone (message_not_found) — OK"
            else
              echo "❌ $ts failed: $resp"
              fail=1
            fi
          done
          exit $fail

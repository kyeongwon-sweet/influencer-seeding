name: _b2b probe (temp)

# 임시: 인지 탭 원본 구조 확인(dump). 확인 후 삭제.
on:
  workflow_dispatch:

env:
  APP_URL: "https://influencer-seeding-mu.vercel.app"

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: dump 인지_쫀득바
        run: |
          curl -sS -G "$APP_URL/api/b2b-revenue/fetch" \
            --data-urlencode "dump=인지_쫀득바" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
          echo

name: _b2b probe (temp)

# 임시 검증: b2b-revenue/fetch 호출(인지 3탭 합산) → debug(6/30·7월 집계) 확인. 확인 후 삭제.
on:
  workflow_dispatch:

env:
  APP_URL: "https://influencer-seeding-mu.vercel.app"

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: b2b fetch 호출
        run: |
          code=$(curl -sS -o /tmp/o -w "%{http_code}" "$APP_URL/api/b2b-revenue/fetch" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP $code"
          cat /tmp/o
          echo

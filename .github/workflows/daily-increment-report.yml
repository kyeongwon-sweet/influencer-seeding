name: Daily Increment Report (12:20 KST)

# 매일 오후 12:20 KST에 협찬 조회수 일일 증분 요약을 여믄봇이 #빙과_마케팅_리포트로 발송.
# 데이터는 '어제(KST)' measured_at 기준 — 어제는 수집이 끝나 값이 정착됐고 대시보드 표에 표시되는
# 확정값과 일치. (당일은 자정수집+백업+재수집이 계속 정착 중이라 값이 오후에 바뀌어 리포트가 흔들림.)
# 수집 자체의 정상/실패 알럿은 수집 직후 황경원 DM으로 별도 발송됨(cron-daily-collect.yml).
on:
  # ▶️ 2026-07-08 재개: catch-up 스파이크·CPV 누적분모·배너 증분·증분테이블 정합 재계산 정정·검증 완료.
  #    (2026-07-06 정지했던 것을 재개 — 어제 확정값만 STRICT_DATE로 발송, 채널 DEDUP 1회.)
  schedule:
    - cron: "20 3 * * *"   # 03:20 UTC = 12:20 KST (주 실행, 매일·주말·공휴일 포함)
    - cron: "20 4 * * *"   # 04:20 UTC = 13:20 KST (백업1)
    - cron: "20 5 * * *"   # 05:20 UTC = 14:20 KST (백업2)
    - cron: "20 6 * * *"   # 06:20 UTC = 15:20 KST (백업3)
  workflow_dispatch:        # 수동 테스트용
    inputs:
      to_dm:
        description: "채널 대신 황경원 DM으로 보내기(미리보기 — 채널에 테스트글 안 쌓임)"
        type: boolean
        default: false
      replace:
        description: "정정 재발송 — 오늘 기존 리포트를 삭제하고 새로 발송"
        type: boolean
        default: false
      delete_only:
        description: "삭제 전용 — 그 날짜 리포트+봇댓글만 삭제하고 재발송 안 함(잘못 나간 리포트 정리)"
        type: boolean
        default: false
      date:
        description: "발송 대상 날짜(YYYY-MM-DD, 비우면 어제 KST). 특정일 정정 재발송용"
        type: string
        default: ""

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: 조회수 증분 리포트 발송 + ts 캡처 (#빙과_마케팅_리포트)
        id: report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          # 인지 광고(메타/틱톡/유튜브) 섹션용 — 시트값을 웹 라우트(/api/awareness-ads, Vercel 서비스계정)에서 읽는다.
          # 둘 중 하나라도 없으면 스크립트가 인지광고 섹션만 조용히 생략(리포트 본문은 정상 발송).
          APP_URL: "https://influencer-seeding-mu.vercel.app"
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # to_dm=true면 황경원 DM(U0B2Y0ZC8QZ)으로, 아니면 빈값 → 스크립트가 기본 채널로 폴백.
          SLACK_CHANNEL: ${{ github.event.inputs.to_dm == 'true' && 'U0B2Y0ZC8QZ' || '' }}
          # 예약 발송은 대상일(어제 KST) 데이터만(없으면 생략). 수동 실행은 폴백 허용(테스트 편의).
          STRICT_DATE: ${{ github.event_name == 'schedule' && '1' || '' }}
          # 채널 발송(=to_dm 아님) 시 하루 1회만: 오늘 리포트가 이미 있으면 생략(백업 창 중복 방지).
          DEDUP: ${{ github.event.inputs.to_dm == 'true' && '' || '1' }}
          # 정정 재발송: 오늘 기존 리포트를 삭제 후 새로 발송(DEDUP 무시).
          REPLACE: ${{ github.event.inputs.replace == 'true' && '1' || '' }}
          # 삭제 전용: 그 날짜 리포트+봇댓글만 삭제하고 재발송 안 함.
          DELETE_ONLY: ${{ github.event.inputs.delete_only == 'true' && '1' || '' }}
          TS_OUT: ${{ runner.temp }}/report_ts.txt
          PYTHONUNBUFFERED: "1"
        run: |
          export MONITORING_DATE="${{ github.event.inputs.date }}"
          [ -z "$MONITORING_DATE" ] && export MONITORING_DATE=$(TZ=Asia/Seoul date -d 'yesterday' +%F)
          cd scripts && python notify_increments.py
          if [ -f "$RUNNER_TEMP/report_ts.txt" ]; then echo "ts=$(cat "$RUNNER_TEMP/report_ts.txt")" >> "$GITHUB_OUTPUT"; fi

      # 리포트 게시 ~15분 후(예약 시 ≈12:35 KST) 상태 요약을 그 리포트의 '댓글(스레드 답글)'로 게시.
      # 수동 실행은 10초만 대기(빠른 검증). 리포트가 실제 게시됐을 때(ts 있음)만 실행.
      - name: 댓글 전 대기 (12:35)
        if: steps.report.outputs.ts != ''
        run: sleep ${{ github.event_name == 'schedule' && '900' || '10' }}

      - name: 상태 알럿을 리포트 댓글로 (여믄봇)
        if: steps.report.outputs.ts != ''
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          # 리포트가 간 곳과 동일 채널의 그 메시지에 답글.
          SLACK_CHANNEL: ${{ github.event.inputs.to_dm == 'true' && 'U0B2Y0ZC8QZ' || 'C0B4F7GBX17' }}
          SLACK_THREAD_TS: ${{ steps.report.outputs.ts }}
          COLLECT_OUTCOME: success
          PYTHONUNBUFFERED: "1"
        run: |
          export MONITORING_DATE="${{ github.event.inputs.date }}"
          [ -z "$MONITORING_DATE" ] && export MONITORING_DATE=$(TZ=Asia/Seoul date -d 'yesterday' +%F)
          cd scripts && python notify_status.py

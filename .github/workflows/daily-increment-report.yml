name: Daily Increment Report (09:30 KST)

# 매일 오전 9:30 KST에 협찬 조회수 일일 증분 요약을 여믄봇이 #빙과_마케팅_리포트로 발송.
# 데이터는 자정 수집(cron-daily-collect.yml)이 이미 적재해 둔 '오늘(KST)' measured_at 기준.
# 수집 자체의 정상/실패 알럿은 수집 직후 황경원 DM으로 별도 발송됨(cron-daily-collect.yml).
on:
  schedule:
    - cron: "30 0 * * *"   # 00:30 UTC = 09:30 KST (주 실행, 매일·주말·공휴일 포함)
    - cron: "30 1 * * *"   # 01:30 UTC = 10:30 KST (백업 — 첫 창을 GitHub이 건너뛰면 커버. 중복은 DEDUP로 방지)
  workflow_dispatch:        # 수동 테스트용
    inputs:
      to_dm:
        description: "채널 대신 황경원 DM으로 보내기(미리보기 — 채널에 테스트글 안 쌓임)"
        type: boolean
        default: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: 조회수 증분 리포트 발송 + ts 캡처 (#빙과_마케팅_리포트)
        id: report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          # to_dm=true면 황경원 DM(U0B2Y0ZC8QZ)으로, 아니면 빈값 → 스크립트가 기본 채널로 폴백.
          SLACK_CHANNEL: ${{ github.event.inputs.to_dm == 'true' && 'U0B2Y0ZC8QZ' || '' }}
          # 예약 발송은 오늘(KST) 데이터만(없으면 생략 — 어제값 재발송 방지). 수동 실행은 폴백 허용(테스트 편의).
          STRICT_DATE: ${{ github.event_name == 'schedule' && '1' || '' }}
          # 채널 발송(=to_dm 아님) 시 하루 1회만: 오늘 리포트가 이미 있으면 생략(백업 창 중복 방지).
          DEDUP: ${{ github.event.inputs.to_dm == 'true' && '' || '1' }}
          TS_OUT: ${{ runner.temp }}/report_ts.txt
          PYTHONUNBUFFERED: "1"
        run: |
          export MONITORING_DATE=$(TZ=Asia/Seoul date +%F)
          cd scripts && python notify_increments.py
          if [ -f "$RUNNER_TEMP/report_ts.txt" ]; then echo "ts=$(cat "$RUNNER_TEMP/report_ts.txt")" >> "$GITHUB_OUTPUT"; fi

      # 리포트 게시 ~15분 후(예약 시 ≈09:45 KST) 상태 요약을 그 리포트의 '댓글(스레드 답글)'로 게시.
      # 수동 실행은 10초만 대기(빠른 검증). 리포트가 실제 게시됐을 때(ts 있음)만 실행.
      - name: 댓글 전 대기 (09:45)
        if: steps.report.outputs.ts != ''
        run: sleep ${{ github.event_name == 'schedule' && '900' || '10' }}

      - name: 상태 알럿을 리포트 댓글로 (여믄봇)
        if: steps.report.outputs.ts != ''
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          # 리포트가 간 곳과 동일 채널의 그 메시지에 답글.
          SLACK_CHANNEL: ${{ github.event.inputs.to_dm == 'true' && 'U0B2Y0ZC8QZ' || 'C0B4F7GBX17' }}
          SLACK_THREAD_TS: ${{ steps.report.outputs.ts }}
          COLLECT_OUTCOME: success
          PYTHONUNBUFFERED: "1"
        run: |
          export MONITORING_DATE=$(TZ=Asia/Seoul date +%F)
          cd scripts && python notify_status.py

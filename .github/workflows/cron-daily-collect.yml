name: Daily Collect (Vercel 크론 대체)

# Vercel 크론을 GitHub Actions로 이전(무료) — Vercel Hobby 다운그레이드용.
# 00:00 KST(15:00 UTC) 클러스터: 채널/비용 동기화 → 전체 수집(run_monitoring) → 브랜드지표·유튜브트렌드·B2B.
# 협찬 수집은 run_monitoring.py로 직접 수행(IG+YT+틱톡+페북+스레드). Vercel 함수 시간제한 영향 없음.
on:
  schedule:
    - cron: "0 15 * * *"   # 00:00 KST
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 협찬 전체 수집 (IG+YT+틱톡+페북+스레드)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: cd scripts && python run_monitoring.py

      - name: 브랜드 지표 (brand-metrics/collect)
        continue-on-error: true
        run: |
          curl -sS "${{ secrets.APP_URL }}/api/brand-metrics/collect" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" -w "\nHTTP %{http_code}\n"

      # 유튜브 트렌드: 키워드별 순차 실행(동시 실행 시 Google 차단·단일 run 시 1개 누락 회피).
      # kw=0 띄우고 ~14분 대기(액터 완료 후) → kw=1. 액터→webhook이 비동기로 DB 기록.
      - name: 유튜브 트렌드 키워드1 (kw=0)
        continue-on-error: true
        run: |
          curl -sS "${{ secrets.APP_URL }}/api/youtube-trends/collect?kw=0" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" -w "\nHTTP %{http_code}\n"
      - name: 액터 완료 대기 (동시 실행 회피)
        run: sleep 840
      - name: 유튜브 트렌드 키워드2 (kw=1)
        continue-on-error: true
        run: |
          curl -sS "${{ secrets.APP_URL }}/api/youtube-trends/collect?kw=1" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" -w "\nHTTP %{http_code}\n"

      - name: B2B 발주량 (b2b-revenue/fetch)
        continue-on-error: true
        run: |
          curl -sS "${{ secrets.APP_URL }}/api/b2b-revenue/fetch" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" -w "\nHTTP %{http_code}\n"

name: Daily Collect (Vercel 크론 대체)

# Vercel 크론을 GitHub Actions로 이전(무료) — Vercel Hobby 다운그레이드용.
# 00:00 KST 목표 수집: 전체 수집(run_monitoring) → 브랜드지표·유튜브트렌드·B2B.
# 협찬 수집은 run_monitoring.py로 직접 수행(IG+YT+틱톡+페북+스레드). Vercel 함수 시간제한 영향 없음.
#
# ⏱ GitHub 스케줄 지연 대응(2026-06-19):
#   - 정각(:00)은 GitHub 부하 피크라 수 시간 지연됨 → 비혼잡 분(:41)으로 이동.
#   - 15:41/17:41/19:41 UTC 3개 창으로 분산: 한 창이 늦어도 다음 창이 더 일찍 실행될 확률↑.
#   - 게이트: '오늘(UTC) 이미 수집됨'이면 무거운 IG·유튜브 수집을 건너뜀 → 중복 Apify 과금 방지.
#     (먼저 도는 창이 수집 → 이후 창은 스킵. measured_at은 기존 UTC 날짜 규칙 유지.)
on:
  schedule:
    - cron: "41 15 * * *"   # 00:41 KST (주 실행)
    - cron: "41 17 * * *"   # 02:41 KST (지연 백업)
    - cron: "41 19 * * *"   # 04:41 KST (지연 백업)
  workflow_dispatch:
    inputs:
      api_only:
        description: "API만 실행(IG 스크랩 건너뜀) — brand/youtube/b2b만 복구(Apify 거의 0)"
        type: boolean
        default: false
      status_test:
        description: "수집 안 하고 상태 알럿(황경원 DM)만 테스트 발송"
        type: boolean
        default: false

# 배포 URL은 여기 한 곳에서만 관리(프로젝트 이전·alias 변경 시 이 줄만 수정).
# ⚠️ -mu(프로덕션 도메인)만 사용 — -kwhwang-s-projects는 Vercel 배포보호(SSO)로 302되어 cron 차단됨(2026-06-30 확인).
env:
  APP_URL: "https://influencer-seeding-mu.vercel.app"

jobs:
  collect:
    if: ${{ github.event.inputs.status_test != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 오늘(KST) 데이터가 이미 있으면(IG + 유튜브) 이번 창은 무거운 수집을 건너뛴다.
      # KST 자정 직후 창(15:41 UTC=00:41 KST)이 UTC 어제로 적재돼 KST '오늘'이 비던 문제 →
      # measured_at·게이트를 KST 날짜 기준으로 통일(아래 MONITORING_DATE=kdate).
      - name: Check today (KST) data
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          export TODAY=$(TZ=Asia/Seoul date -d 'yesterday' +%F)
          echo "kdate=${TODAY}" >> "$GITHUB_OUTPUT"
          STATUS=$(cd scripts && python << 'EOF' | tail -n1
          import os
          from db import get_client
          db = get_client()
          today = os.environ["TODAY"]
          posts = db.table("sponsored_posts").select("id, url, posted_at, ended_at").execute()
          eligible = [
              p for p in (posts.data or [])
              if not p.get("ended_at") and (not p.get("posted_at") or str(p.get("posted_at"))[:10] <= today)
          ]
          eligible_ids = [p["id"] for p in eligible]

          def measured(day):
              total = 0
              for i in range(0, len(eligible_ids), 100):
                  chunk = eligible_ids[i:i + 100]
                  if not chunk:
                      continue
                  r = (
                      db.table("post_daily_stats")
                      .select("id", count="exact")
                      .eq("measured_at", day)
                      .filter("play_count", "not.is", "null")
                      .in_("post_id", chunk)
                      .execute()
                  )
                  total += r.count or 0
              return total

          today_n = measured(today) if eligible_ids else 0
          base = 0
          for k in (1, 2, 3):
              import datetime
              d = (datetime.date.fromisoformat(today) - datetime.timedelta(days=k)).isoformat()
              base = max(base, measured(d))
          complete = True if not eligible_ids else ((today_n >= 0.6 * base) if base else (today_n > 0))
          yt_ids = [p["id"] for p in eligible if "youtube.com" in (p["url"] or "") or "youtu.be" in (p["url"] or "")]
          yt_ok = True
          if yt_ids:
              yr = db.table("post_daily_stats").select("post_id").eq("measured_at", today).in_("post_id", yt_ids).limit(1).execute()
              yt_ok = bool(yr.data)
          import sys
          print(f"today={today_n} base={base} complete={complete} yt_ok={yt_ok}", file=sys.stderr)
          print("ok" if (complete and yt_ok) else "missing")
          EOF
          )
          echo "오늘(KST ${TODAY}) → ${STATUS}"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

      - name: Decide collect
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.check.outputs.status }}" = "missing" ]; then
            echo "수집 진행(누락 또는 수동 실행)"
            echo "go=1" >> "$GITHUB_OUTPUT"
          else
            echo "이미 오늘 수집됨 → 이번 창 건너뜀"
            echo "go=0" >> "$GITHUB_OUTPUT"
          fi

      - name: 협찬 전체 수집 (IG+YT+틱톡+페북+스레드+트위터)
        id: collect
        if: steps.decide.outputs.go == '1' && github.event.inputs.api_only != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          PYTHONUNBUFFERED: "1"
          MONITORING_DATE: ${{ steps.check.outputs.kdate }}   # KST 날짜로 적재(UTC 어제로 밀리는 문제 방지)
        # 실패 사유 알럿용으로 출력을 로그 파일에 캡처(pipefail로 python 실패가 단계 실패에 반영).
        run: |
          cd scripts
          set -o pipefail
          python run_monitoring.py 2>&1 | tee "$RUNNER_TEMP/collect.log"

      # 정상 수집 시 상태 요약은 09:30 리포트 '댓글'로만 게시(daily-increment-report.yml).
      # 여기선 '수집 실패 시에만' 황경원 DM으로 즉시 알림(ONLY_ON_FAILURE) — 실패 blind spot 방지.
      - name: 수집 실패 시 알럿 (황경원 DM)
        if: always() && steps.decide.outputs.go == '1' && github.event.inputs.api_only != 'true'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          MONITORING_DATE: ${{ steps.check.outputs.kdate }}
          COLLECT_OUTCOME: ${{ steps.collect.outcome }}
          COLLECT_LOG: ${{ runner.temp }}/collect.log
          STATUS_USER: U0B2Y0ZC8QZ   # 황경원 Slack user id (DM)
          ONLY_ON_FAILURE: "1"        # 정상이면 발송 안 함(상태는 리포트 댓글로만)
          PYTHONUNBUFFERED: "1"
        run: cd scripts && python notify_status.py

      # 캡션 보강: 메인 IG 액터가 조회수만 주고 캡션을 누락한 게시물을 data-slayer로 채움(캡션 빈 활성 IG만).
      # ⚠️ go==1(이번 창이 실제 수집)에 묶지 않는다 — 수집이 다른 경로/이전 창에서 끝나 go=0이면 캡션이 영영 안 채워지던 문제(2026-07-02, 빈 캡션 77건 누적).
      #    멱등(빈 것만 채움·없으면 0건, Apify 비용도 0)이라 매 창 돌려 안전. api_only 실행만 제외.
      - name: 캡션 보강 (data-slayer)
        if: always() && github.event.inputs.api_only != 'true'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: cd scripts && python backfill_captions.py

      - name: 브랜드 지표 (brand-metrics/collect)
        if: steps.decide.outputs.go == '1'
        continue-on-error: true
        run: |
          code=$(curl -sS -o /tmp/o -w "%{http_code}" "$APP_URL/api/brand-metrics/collect?days=7" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          cat /tmp/o; echo "HTTP $code"
          [ "${code:0:1}" = "2" ] || { echo "::error::brand-metrics 실패 HTTP=$code — 배포/URL 확인($APP_URL)"; exit 1; }

      # 유튜브 트렌드: 키워드별 순차 실행(동시 실행 시 Google 차단·단일 run 시 1개 누락 회피).
      # kw=0 띄우고 ~14분 대기(액터 완료 후) → kw=1. 액터→webhook이 비동기로 DB 기록.
      - name: 유튜브 트렌드 키워드1 (kw=0)
        if: steps.decide.outputs.go == '1'
        continue-on-error: true
        run: |
          code=$(curl -sS -o /tmp/o -w "%{http_code}" "$APP_URL/api/youtube-trends/collect?kw=0" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          cat /tmp/o; echo "HTTP $code"
          [ "${code:0:1}" = "2" ] || { echo "::error::youtube-trends kw=0 실패 HTTP=$code — 배포/URL 확인($APP_URL)"; exit 1; }
      - name: 액터 완료 대기 (동시 실행 회피)
        if: steps.decide.outputs.go == '1'
        run: sleep 840
      - name: 유튜브 트렌드 키워드2 (kw=1)
        if: steps.decide.outputs.go == '1'
        continue-on-error: true
        run: |
          code=$(curl -sS -o /tmp/o -w "%{http_code}" "$APP_URL/api/youtube-trends/collect?kw=1" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          cat /tmp/o; echo "HTTP $code"
          [ "${code:0:1}" = "2" ] || { echo "::error::youtube-trends kw=1 실패 HTTP=$code — 배포/URL 확인($APP_URL)"; exit 1; }

      - name: B2B 발주량 (b2b-revenue/fetch)
        if: steps.decide.outputs.go == '1'
        continue-on-error: true
        run: |
          code=$(curl -sS -o /tmp/o -w "%{http_code}" "$APP_URL/api/b2b-revenue/fetch" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          cat /tmp/o; echo "HTTP $code"
          [ "${code:0:1}" = "2" ] || { echo "::error::b2b-revenue 실패 HTTP=$code — 배포/URL 확인($APP_URL)"; exit 1; }

  # 수동 검증용: 수집 없이 상태 알럿(정상 가정)만 황경원 DM으로 발송 — 미측정 점검 포함.
  status-test:
    if: ${{ github.event.inputs.status_test == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: 수집 상태 알럿 테스트 (황경원 DM)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          COLLECT_OUTCOME: success
          STATUS_USER: U0B2Y0ZC8QZ
          PYTHONUNBUFFERED: "1"
        run: |
          export MONITORING_DATE=$(TZ=Asia/Seoul date -d 'yesterday' +%F)
          cd scripts && python notify_status.py

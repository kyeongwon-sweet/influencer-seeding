name: Run Monitoring

on:
  schedule:
    - cron: "0 15 * * *"  # 매일 UTC 15:00 = KST 00:00 (자정)
  workflow_dispatch:
    inputs:
      monitoring_date:
        description: 'monitoring date (YYYY-MM-DD, default: today)'
        required: false
  repository_dispatch:
    types: [monitoring]

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Normalize URLs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: cd scripts && python normalize_urls.py

      - name: Run monitoring
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOB_PAYLOAD: "{}"
          PYTHONUNBUFFERED: "1"
        run: |
          set -e
          echo "🔍 환경변수 확인..."
          echo "  SUPABASE_URL: $([ -z "$SUPABASE_URL" ] && echo '❌' || echo '✅')"
          echo "  SUPABASE_SERVICE_ROLE_KEY: $([ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && echo '❌' || echo '✅')"
          echo "  APIFY_API_TOKEN: $([ -z "$APIFY_API_TOKEN" ] && echo '❌' || echo '✅')"
          echo "  JOB_PAYLOAD: '$JOB_PAYLOAD'"

          echo ""
          echo "📊 협찬 모니터링 시작..."
          cd scripts && python run_monitoring.py

      - name: Collect brand metrics (YouTube + Instagram)
        run: |
          curl -s -X POST "${{ secrets.APP_URL }}/api/brand-metrics/collect" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

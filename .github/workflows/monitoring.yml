name: Run Monitoring

on:
  # ⚠️ GitHub Actions scheduling disabled - using Vercel Cron Jobs instead
  # If you need to run manually, use workflow_dispatch below
  workflow_dispatch:
    inputs:
      monitoring_date:
        description: 'monitoring date (YYYY-MM-DD, default: today)'
        required: false
  repository_dispatch:
    types: [monitoring]

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Diagnose network connectivity
        run: |
          echo "🔍 네트워크 진단..."
          echo "DNS 테스트:"
          nslookup supabase.co || echo "nslookup 실패"
          getent hosts supabase.co || echo "getent 실패"
          ping -c 1 supabase.co || echo "ping 실패"
          echo ""
          echo "라우팅 정보:"
          ip route || echo "ip route 실패"
          echo ""
          echo "활성 포트:"
          netstat -tuln | head -10 || echo "netstat 실패"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Normalize URLs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🔍 Normalize URLs 환경변수 확인..."
          echo "  SUPABASE_URL: ${#SUPABASE_URL} chars - $([ -z "$SUPABASE_URL" ] && echo '❌ 미설정' || echo '✅ 설정')"
          echo "  SUPABASE_URL value: $SUPABASE_URL"
          echo "  SUPABASE_SERVICE_ROLE_KEY: ${#SUPABASE_SERVICE_ROLE_KEY} chars - $([ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && echo '❌ 미설정' || echo '✅ 설정')"
          echo "  SUPABASE_SERVICE_ROLE_KEY (first 20 chars): ${SUPABASE_SERVICE_ROLE_KEY:0:20}..."
          echo ""
          cd scripts && python normalize_urls.py

      - name: Run monitoring (DB only, skip Apify)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOB_PAYLOAD: "{}"
          SKIP_APIFY: "1"
          PYTHONUNBUFFERED: "1"
        run: |
          set -e
          echo "🔍 환경변수 확인..."
          echo "  SUPABASE_URL length: ${#SUPABASE_URL} chars"
          echo "  SUPABASE_URL: $([ -z "$SUPABASE_URL" ] && echo '❌ 미설정' || echo '✅ 설정됨')"
          echo "  SUPABASE_SERVICE_ROLE_KEY length: ${#SUPABASE_SERVICE_ROLE_KEY} chars"
          echo "  SUPABASE_SERVICE_ROLE_KEY: $([ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && echo '❌ 미설정' || echo '✅ 설정됨')"
          echo "  SKIP_APIFY: $SKIP_APIFY"
          echo ""
          echo "📊 협찬 모니터링 시작 (Apify 스킵)..."
          cd scripts && python run_monitoring.py || (echo "❌ 실패: 위의 에러 메시지 확인" && exit 1)

      - name: Collect Apify data (with retry)
        continue-on-error: true
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOB_PAYLOAD: "{}"
          SKIP_APIFY: "0"
          PYTHONUNBUFFERED: "1"
        run: |
          echo "🔍 Apify 데이터 수집..."
          echo "  APIFY_API_TOKEN length: ${#APIFY_API_TOKEN} chars"
          echo "  APIFY_API_TOKEN: $([ -z "$APIFY_API_TOKEN" ] && echo '❌ 미설정' || echo '✅ 설정됨')"
          echo ""
          echo "🚀 Apify 호출 시작 (자동 재시도 3회)..."
          cd scripts && python run_monitoring.py || echo "⚠️ Apify 데이터 수집 실패 (선택사항이므로 계속 진행)"

      - name: Collect brand metrics (YouTube + Instagram)
        run: |
          curl -s -X POST "${{ secrets.APP_URL }}/api/brand-metrics/collect" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

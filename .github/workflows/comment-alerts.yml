name: Negative Comment Alerts (09:00 KST)

# 협찬 게시물(인스타/유튜브/틱톡) 신규 댓글을 확인해 부정/이슈 댓글만
# 여믄봇이 #통합_dm댓글승인관리(C0B9RR4E8NR)로 알림. 하루 1회.
# 비용 절감: 일일 수집의 comments_count가 늘어난 게시물만 Apify 댓글 액터 실행.
# 사전 조건: Supabase에 scripts/create_post_comments_table.sql 1회 실행 필요.
on:
  schedule:
    - cron: "0 0 * * *"    # 00:00 UTC = 09:00 KST
  workflow_dispatch:        # 수동 테스트용
    inputs:
      to_dm:
        description: "채널 대신 황경원 DM으로 보내기(미리보기 — 채널에 테스트글 안 쌓임)"
        type: boolean
        default: false
      dry_run:
        description: "DRY_RUN — 슬랙 발송·DB 쓰기 없이 로그로만 확인(Apify 수집은 수행)"
        type: boolean
        default: false
      limit_posts:
        description: "스크레이프 게시물 수 상한(비우면 전체) — 프로브용"
        type: string
        default: ""
      setup_test:
        description: "연동 테스트 — 대상에 테스트 메시지 1건만 발송(수집 안 함)"
        type: boolean
        default: false

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: 부정 댓글 감시 + 슬랙 알림
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          # 없으면 키워드 폴백 분류(정확도 낮음). 시크릿 추가 권장.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_CHANNEL: ${{ github.event.inputs.to_dm == 'true' && 'U0B2Y0ZC8QZ' || '' }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
          LIMIT_POSTS: ${{ github.event.inputs.limit_posts }}
          SETUP_TEST: ${{ github.event.inputs.setup_test == 'true' && '1' || '' }}
          PYTHONUNBUFFERED: "1"
        run: cd scripts && python monitor_comments.py

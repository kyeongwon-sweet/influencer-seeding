name: Collect Brand Metrics (Instagram reach + YouTube)

# 브랜드 일별 지표(인스타 도달 등) 수집.
# brand-metrics/collect 가 vercel.json 크론에 없고, 이를 호출하던 monitoring.yml은
# DEPRECATED 라 자동 수집이 끊겨 있었음 → 전용 워크플로로 분리.
on:
  schedule:
    - cron: '30 15 * * *'   # 매일 00:30 KST (전일 데이터 수집)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Collect brand metrics
        run: |
          echo "POST /api/brand-metrics/collect ..."
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/brand-metrics/collect" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
          echo ""

name: (verify) fixcheck
on: { workflow_dispatch: {} }
jobs:
  f:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }
      - run: pip install -r requirements.txt
      - name: fixcheck
        env: { SUPABASE_URL: "${{ secrets.SUPABASE_URL }}", SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}", PYTHONUNBUFFERED: "1" }
        run: cd scripts && python _fixcheck.py

name: (verify) report vs dashboard align

on:
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: 실제 리포트 DRY (07-04, 07-05)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          DRY_RUN: "1"
          PYTHONUNBUFFERED: "1"
        run: |
          cd scripts
          for D in 2026-07-04 2026-07-05; do
            echo "########## 리포트 DRY $D ##########"
            MONITORING_DATE=$D python notify_increments.py | grep -E "오늘 총 증분|발송 생략"
          done
      - name: 대시보드 방식 참조값
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONUNBUFFERED: "1"
        run: cd scripts && python _verify_align.py

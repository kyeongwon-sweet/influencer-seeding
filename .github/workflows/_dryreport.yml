name: (diag) Dry increment report

on:
  workflow_dispatch:
    inputs:
      date:
        description: "MONITORING_DATE (KST, YYYY-MM-DD)"
        type: string
        required: true

jobs:
  dry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: dry render (no send)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          MONITORING_DATE: ${{ github.event.inputs.date }}
          DRY_RUN: "1"
          PYTHONUNBUFFERED: "1"
        run: cd scripts && python notify_increments.py
      - name: prev 로직 점검
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MONITORING_DATE: ${{ github.event.inputs.date }}
          PYTHONUNBUFFERED: "1"
        run: cd scripts && python _diag_prev.py
      - name: 배너 필드 점검
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONUNBUFFERED: "1"
        run: cd scripts && python _diag_banner.py
      - name: 틱톡 수집 점검
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONUNBUFFERED: "1"
        run: cd scripts && python _diag_tiktok.py

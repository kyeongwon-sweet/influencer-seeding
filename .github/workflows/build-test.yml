name: Build Test (Pre-Deploy Check)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # 22 필수: npm test가 쓰는 --experimental-strip-types는 Node 22.6+ 전용(20에선 bad option으로 즉사)
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      # 단위 테스트 — 필터 불변식(pickRangeStats)·정규화·가드 회귀 방지.
      # (이전엔 CI가 테스트를 안 돌려서 url-utils 테스트가 64234f3 이후 조용히 깨진 채 방치됐음)
      - name: Run unit tests
        run: cd web && npm test

      - name: Run auto-end rule regression tests
        run: python3 scripts/test_auto_end_rules.py

      - name: Run build
        run: cd web && npm run build

      - name: ✅ Build successful
        if: success()
        run: |
          echo "🟢 빌드 성공"
          echo "배포 준비 완료"

      - name: ❌ Build failed
        if: failure()
        run: |
          echo "🔴 빌드 실패!"
          echo "❌ main 브랜치 배포 불가"
          echo "원인: monitoring/page.tsx 또는 컴포넌트 에러"
          exit 1

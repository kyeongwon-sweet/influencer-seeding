name: Caption Backfill

# 캡션 빈 활성 IG 게시물을 data-slayer로 채운다(backfill_captions.py).
# 주 트리거는 '이벤트 기반' — 게시물 추가(앱 POST/bulk) 직후 repository_dispatch로 즉시 1회 실행
# (lib/github-dispatch.ts). 폴링 대신이라 낭비 없이 추가 ~1분 내 캡션이 채워진다.
# schedule은 트리거를 놓친 경우 청소용 '안전망 1회/일'로만 둔다(자정 수집 창도 별도로 캡션 보강함).
# 멱등: 빈 캡션 없으면 data-slayer 호출 0(비용 0). Apify 비용은 새 글 수에만 비례.
on:
  repository_dispatch:
    types: [caption-backfill]   # 게시물 추가 시 앱이 발사(이벤트 기반, 주 트리거)
  schedule:
    - cron: "0 4 * * *"         # 04:00 UTC = 13:00 KST (안전망 1회/일 — 놓친 트리거 청소)
  workflow_dispatch:

# 동시 실행 방지 — 짧은 시간에 여러 번 추가돼 여러 dispatch가 와도 한 번에 하나만(중복 data-slayer 호출 방지)
concurrency:
  group: caption-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: 캡션 보강 (data-slayer)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: cd scripts && python backfill_captions.py

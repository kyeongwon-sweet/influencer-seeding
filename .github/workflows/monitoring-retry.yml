name: Monitoring Backup & Retry

# 주 수집기는 Vercel Cron(00:05 KST, apify-collect 비동기 kickoff → webhook handleMonitoring 적재).
# 이 워크플로우는 '안전망': 그날 데이터가 아예 없을 때만 run_monitoring.py로 재수집(Vercel 실패 대비).
#   run_monitoring.py: 레지덴셜 프록시 + shortcode 매칭 + 누적 역행 가드 + upsert(멱등)
# ⚠️ 무조건 top-up(00:15) 크론은 제거 — Vercel 크론과 중복 스크랩 → Apify 중복 과금 방지.

on:
  schedule:
    - cron: "0 2,5,8 * * *"  # 11/14/17 KST — 데이터 없을 때만 재수집(안전망)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check today (KST) data
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          export TODAY_KST=$(TZ=Asia/Seoul date -d 'yesterday' +%F)
          # db.py가 stdout에 DEBUG를 찍으므로 마지막 줄(ok/missing)만 취한다
          STATUS=$(cd scripts && python << 'EOF' | tail -n1
          import os, datetime
          from db import get_client
          db = get_client()
          today = os.environ["TODAY_KST"]
          # ⚠️ 부분수집 감지: '행이 1개라도 있으면 ok'는 부분실패(예: 350개 중 140개만)를 놓쳐
          #    주말 대량 구멍이 방치됐다(2026-07-03~05, 각 ~210개 미수집). → 실측수를 최근 기준선과 비교.
          def measured(day):
              r = db.table("post_daily_stats").select("id", count="exact").eq("measured_at", day).filter("play_count", "not.is", "null").execute()
              return r.count or 0
          today_n = measured(today)
          base = 0
          for k in (1, 2, 3):  # 직전 3일 최대 실측수 = 기준선(주말 저점에 끌려가지 않게 max)
              d = (datetime.date.fromisoformat(today) - datetime.timedelta(days=k)).isoformat()
              base = max(base, measured(d))
          # 완전성: 오늘 실측수가 기준선의 60% 미만이면 부분수집으로 보고 재수집(run_monitoring은 멱등).
          #   임계 60% = 주말 실패(38%)는 잡고 정상 변동(80%+)은 오탐 안 함 → Apify 과금 최소.
          complete = (today_n >= 0.6 * base) if base else (today_n > 0)
          # 유튜브는 별도 액터로 수집되므로 IG가 성공해도 유튜브가 비면 '재수집 대상'으로 본다.
          posts = db.table("sponsored_posts").select("id, url").execute()
          yt_ids = [p["id"] for p in (posts.data or []) if "youtube.com" in (p["url"] or "") or "youtu.be" in (p["url"] or "")]
          yt_ok = True
          if yt_ids:
              yr = db.table("post_daily_stats").select("post_id").eq("measured_at", today).in_("post_id", yt_ids).limit(1).execute()
              yt_ok = bool(yr.data)
          import sys
          print(f"today={today_n} base={base} complete={complete} yt_ok={yt_ok}", file=sys.stderr)
          print("ok" if (complete and yt_ok) else "missing")
          EOF
          )
          echo "오늘(${TODAY_KST}) → ${STATUS}"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

      - name: Decide collect
        id: decide
        run: |
          if [ "${{ github.event.schedule }}" = "15 15 * * *" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.check.outputs.status }}" = "missing" ]; then
            echo "자정 완전수집(top-up) 또는 누락 재수집 → 수집"
            echo "go=1" >> "$GITHUB_OUTPUT"
          else
            echo "이미 데이터 있음(주간) → 건너뜀"
            echo "go=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect (full, run_monitoring.py)
        if: steps.decide.outputs.go == '1'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          SKIP_APIFY: "0"
        run: |
          export MONITORING_DATE=$(TZ=Asia/Seoul date -d 'yesterday' +%F)
          echo "수집 대상(KST): ${MONITORING_DATE}"
          cd scripts && python run_monitoring.py

name: Monitoring Backup & Retry

# Safety retry for monitoring collection.
# It runs only when tracked, view-capable posts are missing today's play_count rows,
# unless manually dispatched or on the designated full top-up schedule.

on:
  schedule:
    - cron: "0 2,5,8 * * *"  # 11/14/17 KST
  workflow_dispatch:
    inputs:
      recollect_all:
        description: "Force recollect all posts for MONITORING_DATE"
        type: boolean
        default: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check today (KST) data
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          export TODAY_KST=$(TZ=Asia/Seoul date -d 'yesterday' +%F)
          STATUS=$(cd scripts && python << 'EOF' | tail -n1
          import os
          import sys
          from db import get_client

          db = get_client()
          today = os.environ["TODAY_KST"]

          def tracks_play_count(url):
              u = (url or "").lower()
              return any(
                  host in u
                  for host in (
                      "instagram.com",
                      "youtube.com",
                      "youtu.be",
                      "tiktok.com",
                      "twitter.com",
                      "x.com",
                  )
              )

          posts = db.table("sponsored_posts").select("id, url, posted_at, ended_at").execute()
          eligible = [
              p for p in (posts.data or [])
              if not p.get("ended_at")
              and (not p.get("posted_at") or str(p.get("posted_at"))[:10] <= today)
              and tracks_play_count(p.get("url"))
          ]
          eligible_ids = [p["id"] for p in eligible]

          measured_ids = set()
          for i in range(0, len(eligible_ids), 100):
              chunk = eligible_ids[i:i + 100]
              if not chunk:
                  continue
              r = (
                  db.table("post_daily_stats")
                  .select("post_id")
                  .eq("measured_at", today)
                  .filter("play_count", "not.is", "null")
                  .in_("post_id", chunk)
                  .execute()
              )
              measured_ids.update(row["post_id"] for row in (r.data or []) if row.get("post_id"))

          missing_ids = [post_id for post_id in eligible_ids if post_id not in measured_ids]
          print(
              f"eligible_views={len(eligible_ids)} measured_views={len(measured_ids)} "
              f"missing_views={len(missing_ids)} sample_missing={missing_ids[:10]}",
              file=sys.stderr,
          )
          print("ok" if not missing_ids else "missing")
          EOF
          )
          echo "today(${TODAY_KST}) => ${STATUS}"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

      - name: Decide collect
        id: decide
        run: |
          if [ "${{ github.event.schedule }}" = "15 15 * * *" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.check.outputs.status }}" = "missing" ]; then
            echo "collecting"
            echo "go=1" >> "$GITHUB_OUTPUT"
          else
            echo "already complete"
            echo "go=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect (full, run_monitoring.py)
        if: steps.decide.outputs.go == '1'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          SKIP_APIFY: "0"
          RECOLLECT_ALL: ${{ github.event.inputs.recollect_all == 'true' && '1' || '0' }}
        run: |
          export MONITORING_DATE=$(TZ=Asia/Seoul date -d 'yesterday' +%F)
          echo "MONITORING_DATE=${MONITORING_DATE}"
          cd scripts && python run_monitoring.py

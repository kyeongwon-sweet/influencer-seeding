name: Monitoring Backup & Retry

# Vercel Cron(00:05 KST, apify-collect)은 300초 제한으로 일부 게시물만 수집됨.
# 00:15 KST에 시간제한 없는 GitHub Actions에서 run_monitoring.py로 '완전 수집'해 보강(top-up).
#   run_monitoring.py: 레지덴셜 프록시 + shortcode 매칭 + 누적 역행 가드 + upsert(멱등)
# 주간(11/14/17 KST)은 그날 데이터가 아예 없을 때만 재수집(완전 실패 대비).

on:
  schedule:
    - cron: "15 15 * * *"    # 00:15 KST — 자정 수집 직후 '완전 수집'(무조건 top-up)
    - cron: "0 2,5,8 * * *"  # 11/14/17 KST — 데이터 없을 때만 재수집
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check today (KST) data
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          export TODAY_KST=$(date -u -d '+9 hours' +%F)
          STATUS=$(cd scripts && python << 'EOF'
          import os
          from db import get_client
          db = get_client()
          today = os.environ["TODAY_KST"]
          any_rows = db.table("post_daily_stats").select("id").eq("measured_at", today).limit(1).execute()
          # 유튜브는 별도 액터로 수집되므로 IG가 성공해도 유튜브가 비면 '재수집 대상'으로 본다.
          posts = db.table("sponsored_posts").select("id, url").execute()
          yt_ids = [p["id"] for p in (posts.data or []) if "youtube.com" in (p["url"] or "") or "youtu.be" in (p["url"] or "")]
          yt_ok = True
          if yt_ids:
              yr = db.table("post_daily_stats").select("post_id").eq("measured_at", today).in_("post_id", yt_ids).limit(1).execute()
              yt_ok = bool(yr.data)
          print("ok" if (any_rows.data and yt_ok) else "missing")
          EOF
          )
          echo "오늘(${TODAY_KST}) → ${STATUS}"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

      - name: Decide collect
        id: decide
        run: |
          if [ "${{ github.event.schedule }}" = "15 15 * * *" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.check.outputs.status }}" = "missing" ]; then
            echo "자정 완전수집(top-up) 또는 누락 재수집 → 수집"
            echo "go=1" >> "$GITHUB_OUTPUT"
          else
            echo "이미 데이터 있음(주간) → 건너뜀"
            echo "go=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect (full, run_monitoring.py)
        if: steps.decide.outputs.go == '1'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          SKIP_APIFY: "0"
        run: |
          export MONITORING_DATE=$(date -u -d '+9 hours' +%F)
          echo "수집 대상(KST): ${MONITORING_DATE}"
          cd scripts && python run_monitoring.py

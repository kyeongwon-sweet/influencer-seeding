name: 런치랩 주간 식단표 알림

on:
  schedule:
    - cron: "0 6 * * 1"   # 매주 월요일 15:00 KST (06:00 UTC)
  workflow_dispatch:

jobs:
  send-menu:
    runs-on: ubuntu-latest
    steps:
      - name: 식단표 파싱 및 Slack 발송
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_LUNCHLAB_BOT_TOKEN }}
        run: |
          python3 - <<'EOF'
          import urllib.request, re, json, os, sys, urllib.parse
          from datetime import date, timedelta

          # 1. 이번 주 월요일 계산 (오늘이 월요일이면 오늘, 아니면 다음 월요일)
          today = date.today()
          days_to_monday = (7 - today.weekday()) % 7
          monday = today + timedelta(days=days_to_monday)
          # 주차 계산: 월 첫날 기준 첫 번째 월요일로부터 몇 번째 주인지
          month = monday.month
          first_of_month = date(monday.year, month, 1)
          first_monday = first_of_month - timedelta(days=first_of_month.weekday())
          week_num = (monday - first_monday).days // 7 + 1
          target_label = f"{month}월{week_num}주차"
          print(f"찾는 주차: {month}월 {week_num}주차 (월요일: {monday})")

          # 2. 페이지 fetch (curl — urllib이 GHA IP 차단 우회)
          import subprocess
          result = subprocess.run([
              "curl", "-s", "-L", "--max-time", "15",
              "-H", "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36",
              "-H", "Accept-Language: ko-KR,ko;q=0.9",
              "-H", "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "https://www.lunchlab.me/menu"
          ], capture_output=True)
          html = result.stdout.decode("utf-8", errors="ignore").replace('\\/', '/')

          # 3. 해당 주차 라벨 위치 찾기
          label_pattern = rf"{month}월\s*{week_num}주차"
          label_m = re.search(label_pattern, html)
          if label_m:
              # 다음 주차 라벨 전까지 구간만 추출
              after_label = html[label_m.end():]
              next_label_m = re.search(r"\d+월\s*\d+주차", after_label)
              section = after_label[:next_label_m.start()] if next_label_m else after_label
              week_label_display = f"{month}월 {week_num}주차"
          else:
              print(f"'{month}월 {week_num}주차' 라벨 못 찾음 — 첫 번째 이미지 사용")
              section = html
              first_label = re.search(r"(\d+월\s*\d+주차)", html)
              week_label_display = first_label.group(1) if first_label else "이번 주"

          # 4. 해당 구간에서 이미지 URL 추출 (첫 2개)
          # Next.js가 /_next/image?url= 형식으로 URL인코딩해서 embed함
          raw_imgs = re.findall(r'https://images\.ctfassets\.net/[^\s"\'<>]+\.(?:png|jpg|jpeg|webp)', section)
          encoded_imgs = re.findall(r'https?%3A%2F%2Fimages\.ctfassets\.net[^\s"\'<>&]+?\.(?:png|jpg|jpeg|webp)', section)
          decoded_imgs = [urllib.parse.unquote(u) for u in encoded_imgs]
          imgs = list(dict.fromkeys(raw_imgs + decoded_imgs))[:2]
          print(f"이미지 {len(imgs)}개 발견")

          # 5. Slack 블록 구성
          blocks = [
              {
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": f":rice: *이번 주 런치랩 식단표 ({week_label_display})*\n:fork_and_knife: <https://www.lunchlab.me/menu|메뉴 보러가기>"
                  }
              }
          ]
          titles = ["가정식 도시락", "프레시밀"]
          for i, url in enumerate(imgs):
              blocks.append({
                  "type": "image",
                  "title": {"type": "plain_text", "text": titles[i] if i < len(titles) else "식단표"},
                  "image_url": url,
                  "alt_text": f"{week_label_display} {titles[i] if i < len(titles) else '식단표'}"
              })

          # 6. chat.postMessage로 발송
          token = os.environ["SLACK_BOT_TOKEN"]
          payload = json.dumps({"channel": "C0BFPQAPHEK", "blocks": blocks}, ensure_ascii=False).encode("utf-8")
          req2 = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=payload,
              headers={
                  "Authorization": "Bearer " + token,
                  "Content-Type": "application/json; charset=utf-8"
              }
          )
          r = json.load(urllib.request.urlopen(req2, timeout=15))
          print("Slack 응답:", r.get("ok"), r.get("error", ""))
          if not r.get("ok"):
              sys.exit(1)
          EOF

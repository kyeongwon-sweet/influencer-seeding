name: _admin delete slack msg (1회용)

# 여믄봇이 올린 메시지를 ts로 삭제(봇 토큰). 중복 리포트 정리용 1회성 유틸.
on:
  workflow_dispatch:
    inputs:
      channel:
        description: "채널 ID"
        required: true
      ts_csv:
        description: "삭제할 message ts (콤마 구분, 답글 먼저→부모 순 권장)"
        required: true

jobs:
  del:
    runs-on: ubuntu-latest
    steps:
      - name: chat.delete
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CH: ${{ github.event.inputs.channel }}
          TSV: ${{ github.event.inputs.ts_csv }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request, urllib.parse
          T = os.environ['SLACK_BOT_TOKEN']; ch = os.environ['CH']
          for ts in os.environ['TSV'].split(','):
              ts = ts.strip()
              if not ts:
                  continue
              data = urllib.parse.urlencode({'channel': ch, 'ts': ts}).encode()
              req = urllib.request.Request('https://slack.com/api/chat.delete', data=data,
                  headers={'Authorization': 'Bearer ' + T,
                           'Content-Type': 'application/x-www-form-urlencoded'})
              r = json.load(urllib.request.urlopen(req, timeout=20))
              print('delete', ts, 'ok=', r.get('ok'), 'error=', r.get('error'))
          PY

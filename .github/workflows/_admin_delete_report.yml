name: _admin delete wrong report (one-off)

# 일회용: 잘못 발송된 '인지 조회수 일일 증분' 리포트(+스레드 답글)를 삭제.
# TARGET_DATE(기본 오늘 KST)와 "일일 증분"이 모두 포함된 봇 메시지만 삭제 → 검색량 리포트 등은 안 건드림.
on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "삭제할 리포트 날짜 (YYYY-MM-DD, 비우면 오늘 KST)"
        default: ""

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: chat.delete 대상 리포트 + 스레드
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          IN_DATE: ${{ github.event.inputs.target_date }}
          PYTHONUNBUFFERED: "1"
        run: |
          python - <<'PY'
          import os, json, urllib.request, urllib.parse, datetime
          TOKEN=os.environ["SLACK_BOT_TOKEN"]; CH="C0B4F7GBX17"
          date=os.environ.get("IN_DATE") or (datetime.datetime.utcnow()+datetime.timedelta(hours=9)).strftime("%Y-%m-%d")
          def get(m,**p):
              u="https://slack.com/api/"+m+"?"+urllib.parse.urlencode(p)
              return json.load(urllib.request.urlopen(urllib.request.Request(u,headers={"Authorization":"Bearer "+TOKEN})))
          def post(m,d):
              return json.load(urllib.request.urlopen(urllib.request.Request("https://slack.com/api/"+m,data=urllib.parse.urlencode(d).encode(),headers={"Authorization":"Bearer "+TOKEN,"Content-Type":"application/x-www-form-urlencoded"})))
          h=get("conversations.history",channel=CH,limit=20)
          print("history ok=",h.get("ok"),h.get("error") or "")
          tgt=[m for m in h.get("messages",[]) if ("일일 증분" in m.get("text","")) and (f"({date})" in m.get("text",""))]
          print(f"[{date}] 대상 리포트 {len(tgt)}건")
          for m in tgt:
              ts=m["ts"]
              if m.get("reply_count",0)>0:
                  r=get("conversations.replies",channel=CH,ts=ts)
                  for rep in r.get("messages",[]):
                      if rep["ts"]!=ts:
                          d=post("chat.delete",{"channel":CH,"ts":rep["ts"]}); print(" reply del",rep["ts"],d.get("ok"),d.get("error") or "")
              d=post("chat.delete",{"channel":CH,"ts":ts}); print(" msg del",ts,d.get("ok"),d.get("error") or "")
          print("done")
          PY

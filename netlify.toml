# Netlify 임시 배포용 설정 (Vercel 무료 한도 초과 시 백업 호스팅).
# Next.js 앱은 web/ 하위에 있으므로 base를 web으로 지정.
[build]
  base = "web"
  command = "npm run build"
  # publish는 base와 달라야 함(같으면 next 플러그인 실패). base 기준 Next 출력 디렉터리.
  publish = ".next"

# Next.js(App Router·미들웨어·API 라우트) 지원 플러그인. Netlify가 자동 설치.
[[plugins]]
  package = "@netlify/plugin-nextjs"
